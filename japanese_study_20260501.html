      <button class="nav-btn" id="nextBtn" onclick="event.stopPropagation(); nextCard()">다음 ▶</button>
    </div>
    <div class="learn-btns" id="learnBtns" style="display:none">
      <button class="btn-learned" onclick="markLearnedAndNext()">✓ 알았어요</button>
      <button class="btn-review" onclick="markReviewAndNext()">🔄 다시 볼게요</button>
    </div>
  </div>

  <div class="card" id="todayGrammarCard">
    <h2>📝 오늘의 문법</h2>
    <div id="todayGrammarBody"></div>
  </div>

  <div class="card">
    <h2>📊 학습 진행도</h2>
    <div id="progressSection"></div>
  </div>
</div>

<!-- 단어장 탭 -->
<div id="tab-vocab" class="tab-content">
  <div class="card" style="padding-bottom:8px">
    <input class="search-box" id="wordSearch" type="text" placeholder="단어 검색 (일본어 또는 한국어)..." oninput="filterWords()">
    <div class="filter-btns" id="filterBtns">
      <button class="filter-btn active" onclick="setFilter('all',this)">전체</button>
      <button class="filter-btn" onclick="setFilter('3-9과',this)">3-9과</button>
      <button class="filter-btn" onclick="setFilter('10-15과',this)">10-15과</button>
      <button class="filter-btn" onclick="setFilter('16-20과',this)">16-20과</button>
      <button class="filter-btn" onclick="setFilter('동사',this)">동사</button>
      <button class="filter-btn" onclick="setFilter('형용사',this)">형용사</button>
      <button class="filter-btn" onclick="setFilter('명사',this)">명사</button>
      <button class="filter-btn" onclick="setFilter('여행',this)">여행</button>
      <button class="filter-btn" onclick="setFilter('unlearned',this)">⬜ 미학습</button>
    </div>
  </div>
  <div id="wordListContainer"></div>
</div>

<!-- 문법 탭 -->
<div id="tab-grammar" class="tab-content">
  <div id="grammarContainer"></div>
</div>

<!-- 여행회화 탭 -->
<div id="tab-travel" class="tab-content">
  <div id="travelContainer"></div>
</div>

<!-- 드라마 탭 -->
<div id="tab-drama" class="tab-content">
  <div id="dramaContainer"></div>
</div>

<script>
// ============================================================
// 학습 진행도 (localStorage)
// ============================================================
const PROGRESS_KEY = 'jp_study_progress';

function getProgress() {
  return JSON.parse(localStorage.getItem(PROGRESS_KEY) || '{}');
}

function markLearned(id) {
  const p = getProgress();
  p[id] = { status: 'learned', date: new Date().toISOString() };
  localStorage.setItem(PROGRESS_KEY, JSON.stringify(p));
}

function markReview(id) {
  const p = getProgress();
  p[id] = { status: 'review' };
  localStorage.setItem(PROGRESS_KEY, JSON.stringify(p));
}

function isLearned(id) {
  return getProgress()[id]?.status === 'learned';
}

function learnedCount() {
  const p = getProgress();
  return Object.values(p).filter(v => v.status === 'learned').length;
}

// ============================================================
// 앱 상태
// ============================================================
let currentFilter = 'all';
let currentCardIndex = 0;
let todayWords = [];
let isFlipped = false;

// ============================================================
// 날짜 유틸
// ============================================================
function getToday() { return new Date(2026, 4, 1); }

function formatDate(d) {
  const days = ['일','월','화','수','목','금','토'];
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
}

function getDayOfYear(d) {
  const start = new Date(d.getFullYear(), 0, 0);
  return Math.floor((d - start) / 86400000);
}

function stripHtml(s) {
  return (s || '').replace(/<[^>]+>/g, '');
}

// ============================================================
// 오늘의 학습
// ============================================================
function initToday() {
  const d = getToday();
  document.getElementById('headerDate').textContent = formatDate(d);
  document.getElementById('todayDate').textContent = formatDate(d);

  const doy = getDayOfYear(d);
  const lessons = [
    '3과 복습','4과 복습','5과 복습','6과 복습','7과 복습',
    '8과 복습','9과 복습','10과 복습','11과 복습','12과 복습',
    '13과 복습','14과 복습','15과 복습','16과 복습','17과 복습',
    '18과 복습','19과 복습','20과 복습','한걸음 복습','총복습',
  ];
  document.getElementById('todayTitle').textContent = `오늘의 레슨: ${lessons[doy % lessons.length]}`;
  document.getElementById('todaySub').textContent = '플래시카드로 오늘의 단어를 익혀보세요!';

  // 스트릭 바
  const streak = document.getElementById('streakBar');
  streak.innerHTML = '';
  const dayNames = ['일','월','화','수','목','금','토'];
  for (let i = -6; i <= 0; i++) {
    const dd = new Date(d); dd.setDate(d.getDate() + i);
    const el = document.createElement('div');
    el.className = 'streak-day ' + (i === 0 ? 'today' : (i < 0 ? 'done' : 'empty'));
    el.textContent = dayNames[dd.getDay()];
    streak.appendChild(el);
  }

  // 오늘의 단어: 미학습 우선, 날짜 기반 10개
  const progress = getProgress();
  const unlearned = WORDS.filter(w => !isLearned(w.id));
  const learned = WORDS.filter(w => isLearned(w.id));
  const pool = [...unlearned, ...learned];
  const start = (doy * 10) % pool.length;
  todayWords = [];
  for (let i = 0; i < 10; i++) todayWords.push(pool[(start + i) % pool.length]);

  currentCardIndex = 0;
  isFlipped = false;
  updateFlashcard();

  // 오늘의 문법
  const gramIdx = doy % GRAMMAR.length;
  const g = GRAMMAR[gramIdx];
  const nextG = GRAMMAR[(gramIdx + 1) % GRAMMAR.length];
  document.getElementById('todayGrammarBody').innerHTML = renderGrammarItem(g) + renderGrammarItem(nextG);

  // 진행도
  const totalWords = WORDS.length;
  const done = learnedCount();
  document.getElementById('progressSection').innerHTML = `
    <div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;font-size:0.82rem;margin-bottom:4px">
        <span>단어 학습 완료</span>
        <span style="color:var(--success);font-weight:700">${done} / ${totalWords}개</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${(done/totalWords*100).toFixed(0)}%"></div></div>
      <div class="progress-text">${(done/totalWords*100).toFixed(0)}% 완료</div>
    </div>
    <div>
      <div style="display:flex;justify-content:space-between;font-size:0.82rem;margin-bottom:4px">
        <span>전체 과정</span>
        <span style="color:var(--secondary);font-weight:700">${lessons[doy % lessons.length]}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${((doy % lessons.length + 1)/lessons.length*100).toFixed(0)}%;background:linear-gradient(90deg,var(--secondary),#6baed6)"></div></div>
    </div>
  `;
}

function renderGrammarItem(g) {
  const exHtml = (g.examples || []).map(e => `
    <div class="grammar-ex">
      <div class="jp">${e.jp}</div>
      <div class="kr">${e.ko || e.kr}</div>
    </div>
  `).join('');
  return `
    <div class="grammar-item">
      <div class="grammar-title">${g.title} <span class="badge blue">${g.level}</span></div>
      <div class="grammar-desc">${g.desc}</div>
      ${exHtml}
    </div>
  `;
}

function updateFlashcard() {
  if (!todayWords.length) return;
  const w = todayWords[currentCardIndex];
  const learned = isLearned(w.id);

  document.getElementById('fc-jp').innerHTML = w.jp;
  document.getElementById('fc-reading').textContent = w.kana || w.reading || '';
  document.getElementById('fc-kr').textContent = w.ko || w.kr;
  document.getElementById('fc-reading2').textContent = `(${w.kana || w.reading || ''})`;

  const exJp = w.example_jp || '';
  const exKo = w.example_ko || '';
  document.getElementById('fc-example').innerHTML = exJp
    ? `<div>${exJp}</div><div style="color:#aaa">${exKo}</div>`
    : '';

  document.getElementById('cardCounter').textContent = `${currentCardIndex + 1} / ${todayWords.length}`;
  document.getElementById('prevBtn').disabled = currentCardIndex === 0;
  document.getElementById('nextBtn').disabled = currentCardIndex === todayWords.length - 1;

  // 플래시카드 뒤집기 초기화
  if (isFlipped) {
    document.getElementById('flashcard').classList.remove('flipped');
    isFlipped = false;
    document.getElementById('learnBtns').style.display = 'none';
  }

  // 이미 학습한 단어는 카운터 옆에 표시
  const counter = document.getElementById('cardCounter');
  counter.innerHTML = `${currentCardIndex + 1} / ${todayWords.length}${learned ? ' <span class="learned-badge">✓ 완료</span>' : ''}`;
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('flashcard').classList.toggle('flipped', isFlipped);
  document.getElementById('learnBtns').style.display = isFlipped ? 'flex' : 'none';
}

function prevCard() {
  if (currentCardIndex > 0) { currentCardIndex--; updateFlashcard(); }
}

function nextCard() {
  if (currentCardIndex < todayWords.length - 1) { currentCardIndex++; updateFlashcard(); }
}

function markLearnedAndNext() {
  const w = todayWords[currentCardIndex];
  markLearned(w.id);
  // 진행도 업데이트
  initToday();
  if (currentCardIndex < todayWords.length - 1) { currentCardIndex++; }
  updateFlashcard();
}

function markReviewAndNext() {
  const w = todayWords[currentCardIndex];
  markReview(w.id);
  if (currentCardIndex < todayWords.length - 1) { currentCardIndex++; updateFlashcard(); }
  else updateFlashcard();
}

// ============================================================
// 단어장
// ============================================================
function initVocab() { filterWords(); }

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterWords();
}

function filterWords() {
  const q = (document.getElementById('wordSearch').value || '').toLowerCase();
  const progress = getProgress();

  let filtered = WORDS.filter(w => {
    if (currentFilter === 'unlearned') return !isLearned(w.id);
    const matchFilter = currentFilter === 'all' || w.level === currentFilter || w.tag === currentFilter;
    const plain = stripHtml(w.jp).toLowerCase();
    const matchQ = !q || plain.includes(q) || (w.kana||'').includes(q) || (w.ko||w.kr||'').includes(q);
    return matchFilter && matchQ;
  });

  const container = document.getElementById('wordListContainer');
  if (!filtered.length) {
    container.innerHTML = '<div class="card"><div class="empty-state">검색 결과가 없습니다.</div></div>';
    return;
  }

  // 레벨별 그룹
  const groups = {};
  filtered.forEach(w => {
    const g = w.level;
    if (!groups[g]) groups[g] = [];
    groups[g].push(w);
  });

  let html = '';
  Object.entries(groups).forEach(([g, ws]) => {
    const items = ws.map(w => {
      const learned = isLearned(w.id);
      return `
        <li class="word-item">
          <div class="word-check ${learned ? 'done' : ''}" onclick="toggleWordLearned('${w.id}', this)">${learned ? '✓' : ''}</div>
          <div>
            <div class="word-jp">${w.jp}</div>
            <div class="word-reading">${w.kana || w.reading || ''}</div>
          </div>
          <div class="word-kr">${w.ko || w.kr}</div>
          <span class="word-tag">${w.tag}</span>
        </li>
      `;
    }).join('');
    html += `
      <div class="card" style="padding-bottom:4px">
        <h2><span class="badge">${g}</span> ${ws.length}개</h2>
        <ul class="word-list">${items}</ul>
      </div>
    `;
  });
  container.innerHTML = html;
}

function toggleWordLearned(id, el) {
  if (isLearned(id)) {
    markReview(id);
    el.classList.remove('done');
    el.textContent = '';
  } else {
    markLearned(id);
    el.classList.add('done');
    el.textContent = '✓';
  }
  // 진행도 업데이트
  document.getElementById('progressSection') && initTodayProgress();
}

function initTodayProgress() {
  const totalWords = WORDS.length;
  const done = learnedCount();
  const el = document.getElementById('progressSection');
  if (!el) return;
  const doy = getDayOfYear(getToday());
  const lessons = ['3과 복습','4과 복습','5과 복습','6과 복습','7과 복습','8과 복습','9과 복습','10과 복습','11과 복습','12과 복습','13과 복습','14과 복습','15과 복습','16과 복습','17과 복습','18과 복습','19과 복습','20과 복습','한걸음 복습','총복습'];
  el.innerHTML = `
    <div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;font-size:0.82rem;margin-bottom:4px">
        <span>단어 학습 완료</span>
        <span style="color:var(--success);font-weight:700">${done} / ${totalWords}개</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${(done/totalWords*100).toFixed(0)}%"></div></div>
      <div class="progress-text">${(done/totalWords*100).toFixed(0)}% 완료</div>
    </div>
  `;
}

// ============================================================
// 문법
// ============================================================
function initGrammar() {
  const container = document.getElementById('grammarContainer');
  const verbTable = `
    <div class="card" style="margin-bottom:14px">
      <h2>🔤 동사 ます형 활용 규칙</h2>
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:0.82rem;margin-top:8px">
          <thead>
            <tr style="background:#f0f4f8">
              <th style="padding:8px;border:1px solid var(--border);text-align:left">그룹</th>
              <th style="padding:8px;border:1px solid var(--border);text-align:left">규칙</th>
              <th style="padding:8px;border:1px solid var(--border);text-align:left">예시</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td style="padding:8px;border:1px solid var(--border);font-weight:700;color:var(--primary)">1그룹<br><small>(う단 동사)</small></td>
              <td style="padding:8px;border:1px solid var(--border)">마지막 う단 → い단 + ます</td>
              <td style="padding:8px;border:1px solid var(--border)">いく→いき<b>ます</b><br>のむ→のみ<b>ます</b><br>はなす→はなし<b>ます</b></td>
            </tr>
            <tr style="background:#fafafa">
              <td style="padding:8px;border:1px solid var(--border);font-weight:700;color:var(--secondary)">2그룹<br><small>(る동사)</small></td>
              <td style="padding:8px;border:1px solid var(--border)">る를 떼고 + ます</td>
              <td style="padding:8px;border:1px solid var(--border)">たべる→たべ<b>ます</b><br>おきる→おき<b>ます</b><br>ねる→ね<b>ます</b></td>
            </tr>
            <tr>
              <td style="padding:8px;border:1px solid var(--border);font-weight:700;color:var(--success)">3그룹<br><small>(불규칙)</small></td>
              <td style="padding:8px;border:1px solid var(--border)">통째로 암기</td>
              <td style="padding:8px;border:1px solid var(--border)">する→し<b>ます</b><br>くる→き<b>ます</b></td>
            </tr>
            <tr style="background:#fff9f0">
              <td style="padding:8px;border:1px solid var(--border);font-weight:700;color:#c77a00">예외 (2→1)</td>
              <td style="padding:8px;border:1px solid var(--border)">る로 끝나지만 1그룹</td>
              <td style="padding:8px;border:1px solid var(--border)">かえる→かえり<b>ます</b><br>はいる→はいり<b>ます</b><br>はしる→はしり<b>ます</b></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  `;

  const grammarHtml = GRAMMAR.map(g => renderGrammarItem(g)).join('');
  container.innerHTML = verbTable + `<div class="card"><h2>📝 문법 패턴 (${GRAMMAR.length}개)</h2>${grammarHtml}</div>`;
}

// ============================================================
// 여행회화
// ============================================================
function initTravel() {
  const container = document.getElementById('travelContainer');
  const html = TRAVEL.map((t, i) => {
    const header = t.icon ? `${t.icon} ${t.situation}` : (t.category || t.situation || '');
    const dialogues = (t.dialogues || []).map(d => `
      <div class="dialogue">
        <div class="dialogue-role">${d.speaker || d.role}</div>
        <div class="dialogue-jp">${d.jp}</div>
        <div class="dialogue-kr">${d.ko || d.kr}</div>
      </div>
    `).join('');
    return `
      <div class="situation-card">
        <div class="situation-header" onclick="toggleSituation(${i})">
          <span>${header}</span>
          <span class="chevron" id="chev-${i}">▼</span>
        </div>
        <div class="situation-body" id="sit-${i}">${dialogues}</div>
      </div>
    `;
  }).join('');
  container.innerHTML = html;
}

function toggleSituation(i) {
  document.getElementById(`sit-${i}`).classList.toggle('open');
  document.getElementById(`chev-${i}`).classList.toggle('open');
}

// ============================================================
// 드라마
// ============================================================
function initDrama() {
  const container = document.getElementById('dramaContainer');
  const stages = [1, 2, 3, 4];
  const stageLabels = {1:'1단계 (입문)', 2:'2단계 (초급)', 3:'3단계 (중급)', 4:'4단계 (고급)'};
  let html = '';

  stages.forEach(stage => {
    const items = DRAMA.filter(d => d.stage === stage);
    if (!items.length) return;
    html += `<div class="section-title">${stageLabels[stage]}</div>`;

    items.forEach((d, i) => {
      const uid = `drama-${stage}-${i}`;
      const wordHtml = (d.words || []).map(w => `
        <div style="display:flex;gap:8px;font-size:0.85rem;margin-bottom:3px">
          <span style="color:var(--secondary);font-weight:700;min-width:120px">${w.jp}</span>
          <span>${w.ko || w.kr}</span>
        </div>
      `).join('');

      const linesHtml = (d.lines || []).map(l => `
        <div class="drama-line">
          <div class="drama-speaker">${l.speaker}</div>
          <div class="drama-jp">${l.jp}</div>
          <div class="drama-kr">${l.ko || l.kr}</div>
        </div>
      `).join('');

      html += `
        <div class="drama-card drama-stage-${stage}">
          <div class="drama-header" onclick="toggleDrama('${uid}')">
            <span>🎬 ${d.title}</span>
            <span class="chevron" id="dchev-${uid}">▼</span>
          </div>
          <div class="drama-body" id="${uid}">
            ${linesHtml}
            ${wordHtml ? `<div class="word-point"><div class="word-point-title">📌 단어 포인트</div>${wordHtml}</div>` : ''}
          </div>
        </div>
      `;
    });
  });

  container.innerHTML = html;
}

function toggleDrama(uid) {
  document.getElementById(uid).classList.toggle('open');
  document.getElementById(`dchev-${uid}`).classList.toggle('open');
}

// ============================================================
// 탭 전환
// ============================================================
const tabIds = ['today', 'vocab', 'grammar', 'travel', 'drama'];

function showTab(tabName) {
  tabIds.forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('active', t === tabName);
  });
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', tabIds[i] === tabName);
  });
  if (tabName === 'vocab') initVocab();
  if (tabName === 'grammar') initGrammar();
  if (tabName === 'travel') initTravel();
  if (tabName === 'drama') initDrama();
}

// 앱 시작
initToday();
</script>
</body>
</html>
