<style>
  :root {
    --primary: #e63946;
    --primary-dark: #c1121f;
    --secondary: #457b9d;
    --accent: #f4a261;
    --bg: #f8f9fa;
    --card-bg: #ffffff;
    --text: #2d2d2d;
    --text-light: #6c757d;
    --border: #dee2e6;

    --shadow: 0 2px 12px rgba(0,0,0,0.1);
    --radius: 14px;

  * { box-sizing: border-box; margin: 0; padding: 0; }

  rt { font-size: 0.62em; font-weight: 600; letter-spacing: 0; opacity: 0.95; }
  body {

    color: var(--text);

  header {
    background: linear-gradient(135deg, var(--primary) 0%, #c1121f 100%);
    color: #fff;
    padding: 18px 20px 14px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(230,57,70,0.3);
    position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.5px; }
  header p { font-size: 0.8rem; opacity: 0.85; margin-top: 2px; }

  .tab-bar {
    display: flex;
    background: #fff;
    border-bottom: 2px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
    position: sticky; top: 64px; z-index: 99;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex: 1;
    min-width: 80px;
    padding: 12px 8px;
    border: none;
    background: none;
    font-size: 0.78rem;

  .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); background: #fff5f5; }
  .tab-btn:hover { background: #f8f8f8; }

  .tab-content { display: none; padding: 16px; max-width: 860px; margin: 0 auto; }
  .tab-content.active { display: block; }

  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 18px;
    margin-bottom: 14px;

    font-size: 1rem;
    color: var(--primary);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;

  .badge {
    display: inline-block;
    background: var(--primary);
    color: #fff;
    font-size: 0.68rem;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 600;

  .badge.blue { background: var(--secondary); }
  .badge.green { background: var(--success); }
  .badge.orange { background: var(--accent); color: #333; }

  ruby rt {
    font-size: 0.55em;
    color: var(--text-light);
  }

  /* 오늘의 학습 헤더 */
  .today-header {
    background: linear-gradient(135deg, var(--primary), #457b9d);
    color: #fff;
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 14px;
    text-align: center;
  }
  .today-header .date-label { font-size: 0.8rem; opacity: 0.85; }
  .today-header .lesson-title { font-size: 1.4rem; font-weight: 700; margin: 6px 0 4px; }
  .today-header .lesson-sub { font-size: 0.85rem; opacity: 0.9; }

  /* 스트릭 바 */
  .streak-bar { display: flex; justify-content: center; gap: 6px; margin-top: 14px; }
  .streak-day {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);

    perspective: 1000px;
    height: 180px;
    cursor: pointer;
    margin-bottom: 14px;

    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;

  .flashcard.flipped { transform: rotateY(180deg); }
  .flashcard-front, .flashcard-back {
    position: absolute; width: 100%; height: 100%;

    align-items: center; justify-content: center;
    padding: 20px;
    box-shadow: var(--shadow);

  .flashcard-example { font-size: 0.95rem; color: var(--text-light); margin-top: 8px; text-align: center; line-height: 1.4; }

    font-size: 0.82rem; font-weight: 600; cursor: pointer;
  }
  .nav-btn:disabled { opacity: 0.4; cursor: default; }
  .card-counter { font-size: 0.82rem; color: var(--text-light); min-width: 50px; text-align: center; }

  /* 학습 버튼 */
  .learn-btns {
    display: flex; gap: 10px; justify-content: center;
    margin-top: 4px;
  }
  .btn-learned {
    background: var(--success); color: #fff;
    border: none; border-radius: 20px; padding: 8px 22px;
    font-size: 0.85rem; cursor: pointer; font-weight: 700;
    transition: opacity 0.2s;
  }
  .btn-learned:hover { opacity: 0.85; }
  .btn-review {
    background: #f0f4f8; color: var(--text);
    border: 1px solid var(--border); border-radius: 20px; padding: 8px 22px;
    font-size: 0.85rem; cursor: pointer; font-weight: 600;
  }
  .progress-bar { background: var(--bg); border-radius: 10px; height: 8px; overflow: hidden; margin-top: 4px; }
  .progress-fill { height: 100%; border-radius: 10px; background: linear-gradient(90deg, var(--primary), var(--accent)); transition: width 0.6s; }
  .progress-text { font-size: 0.75rem; color: var(--text-light); margin-top: 4px; text-align: right; }

  /* 검색 & 필터 */
  .search-box {
    width: 100%; padding: 10px 14px; border: 1px solid var(--border);
    border-radius: 20px; font-size: 0.88rem; outline: none; margin-bottom: 10px;
  }
  .search-box:focus { border-color: var(--primary); }
  .filter-btns { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
  .filter-btn {
    padding: 4px 12px; border: 1px solid var(--border); border-radius: 20px;
    font-size: 0.75rem; background: none; cursor: pointer; font-weight: 600; color: var(--text-light);
  }
  .filter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

  /* 단어 목록 */
  .word-list { list-style: none; }
  .word-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .word-item:last-child { border-bottom: none; }
  .word-jp { font-size: 1.05rem; font-weight: 700; color: var(--primary); line-height: 1.5; }
  .word-reading { font-size: 0.78rem; color: var(--text-light); }
  .word-kr { flex: 1; font-size: 0.88rem; }
  .word-tag { background: #f0f4f8; color: var(--secondary); font-size: 0.68rem; padding: 2px 8px; border-radius: 10px; font-weight: 600; white-space: nowrap; }
  .word-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 0.7rem; cursor: pointer; }
  .word-check.done { background: var(--success); border-color: var(--success); color: #fff; font-weight: 700; }

  /* 문법 */
  .grammar-item { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  .grammar-item:last-child { border-bottom: none; margin-bottom: 0; }
  .grammar-title { font-weight: 700; font-size: 1rem; margin-bottom: 4px; }

<script>
// ============================================================
// 학습 진행도 (localStorage)
// ============================================================
const PROGRESS_KEY = 'jp_study_progress';

function getProgress() {
  return JSON.parse(localStorage.getItem(PROGRESS_KEY) || '{}');
}

function markLearned(id) {
  const p = getProgress();
  p[id] = { status: 'learned', date: new Date().toISOString() };
  localStorage.setItem(PROGRESS_KEY, JSON.stringify(p));
}

function markReview(id) {
  const p = getProgress();
  p[id] = { status: 'review' };
  localStorage.setItem(PROGRESS_KEY, JSON.stringify(p));
}

function isLearned(id) {
  return getProgress()[id]?.status === 'learned';
}

function learnedCount() {
  const p = getProgress();
  return Object.values(p).filter(v => v.status === 'learned').length;
}

// ============================================================
// 앱 상태
// ============================================================
let currentFilter = 'all';
let currentCardIndex = 0;
let todayWords = [];
let isFlipped = false;

// ============================================================
// 날짜 유틸
// ============================================================
function getToday() { return new Date(2026, 6, 13); }

function formatDate(d) {
  const days = ['일','월','화','수','목','금','토'];
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
}

function getDayOfYear(d) {
  const start = new Date(d.getFullYear(), 0, 0);
  return Math.floor((d - start) / 86400000);
}

function stripHtml(s) {
  return (s || '').replace(/<[^>]+>/g, '');
}

// ============================================================
// 오늘의 학습
// ============================================================
function initToday() {
  const d = getToday();
  document.getElementById('headerDate').textContent = formatDate(d);
  document.getElementById('todayDate').textContent = formatDate(d);

  const doy = getDayOfYear(d);
  const lessons = [
    '3과 복습','4과 복습','5과 복습','6과 복습','7과 복습',
    '8과 복습','9과 복습','10과 복습','11과 복습','12과 복습',
    '13과 복습','14과 복습','15과 복습','16과 복습','17과 복습',
    '18과 복습','19과 복습','20과 복습','한걸음 복습','총복습',
  ];
  document.getElementById('todayTitle').textContent = `오늘의 레슨: ${lessons[doy % lessons.length]}`;
  document.getElementById('todaySub').textContent = '플래시카드로 오늘의 단어를 익혀보세요!';

  // 스트릭 바
  const streak = document.getElementById('streakBar');
  streak.innerHTML = '';
  const dayNames = ['일','월','화','수','목','금','토'];
  for (let i = -6; i <= 0; i++) {
    const dd = new Date(d); dd.setDate(d.getDate() + i);
    const el = document.createElement('div');
    el.className = 'streak-day ' + (i === 0 ? 'today' : (i < 0 ? 'done' : 'empty'));
    el.textContent = dayNames[dd.getDay()];
    streak.appendChild(el);
  }

  // 오늘의 단어: 미학습 우선, 날짜 기반 10개
  const progress = getProgress();
  const unlearned = WORDS.filter(w => !isLearned(w.id));
  const learned = WORDS.filter(w => isLearned(w.id));
  const pool = [...unlearned, ...learned];
  const start = (doy * 10) % pool.length;
  todayWords = [];
  for (let i = 0; i < 10; i++) todayWords.push(pool[(start + i) % pool.length]);

  currentCardIndex = 0;
  isFlipped = false;
  updateFlashcard();

  // 오늘의 문법
  const gramIdx = doy % GRAMMAR.length;
  const g = GRAMMAR[gramIdx];
  const nextG = GRAMMAR[(gramIdx + 1) % GRAMMAR.length];
  document.getElementById('todayGrammarBody').innerHTML = renderGrammarItem(g) + renderGrammarItem(nextG);

  // 진행도
  const totalWords = WORDS.length;
  const done = learnedCount();
  document.getElementById('progressSection').innerHTML = `
    <div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;font-size:0.82rem;margin-bottom:4px">
        <span>단어 학습 완료</span>
        <span style="color:var(--success);font-weight:700">${done} / ${totalWords}개</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${(done/totalWords*100).toFixed(0)}%"></div></div>
      <div class="progress-text">${(done/totalWords*100).toFixed(0)}% 완료</div>
    </div>
    <div>
      <div style="display:flex;justify-content:space-between;font-size:0.82rem;margin-bottom:4px">
        <span>전체 과정</span>
        <span style="color:var(--secondary);font-weight:700">${lessons[doy % lessons.length]}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${((doy % lessons.length + 1)/lessons.length*100).toFixed(0)}%;background:linear-gradient(90deg,var(--secondary),#6baed6)"></div></div>
    </div>
  `;
}

function renderGrammarItem(g) {
  const conjHtml = (g.conjugation || []).length ? `
    <table class="conj-table">
      <thead><tr><th>형태</th><th>규칙</th><th>예</th></tr></thead>
      <tbody>${(g.conjugation).map(c => `<tr><td>${c.form}</td><td>${c.rule}</td><td>${c.examples}</td></tr>`).join('')}</tbody>
    </table>` : '';
  const exHtml = (g.examples || []).map(e => `
    <div class="grammar-ex">
      <div class="jp">${e.jp}</div>
      <div class="kr">${e.ko || e.kr}</div>
    </div>
  `).join('');
  return `
    <div class="grammar-item">
      <div class="grammar-title">${g.title}</div>
      <div class="grammar-desc">${g.desc}</div>
      ${conjHtml}
      ${exHtml}
    </div>
  `;
}

function updateFlashcard() {
  if (!todayWords.length) return;
  const w = todayWords[currentCardIndex];
  const learned = isLearned(w.id);

  document.getElementById('fc-jp').innerHTML = w.jp;
  document.getElementById('fc-kr').textContent = w.ko || w.kr;

  const exJp = w.example_jp || '';
  const exKo = w.example_ko || '';
  document.getElementById('fc-example').innerHTML = exJp
    ? `<div>${exJp}</div><div style="color:#aaa">${exKo}</div>`
    : '';

  document.getElementById('cardCounter').textContent = `${currentCardIndex + 1} / ${todayWords.length}`;
  document.getElementById('prevBtn').disabled = currentCardIndex === 0;
  document.getElementById('nextBtn').disabled = currentCardIndex === todayWords.length - 1;

  // 플래시카드 뒤집기 초기화
  if (isFlipped) {
    document.getElementById('flashcard').classList.remove('flipped');
    isFlipped = false;
    document.getElementById('learnBtns').style.display = 'none';
  }

  // 이미 학습한 단어는 카운터 옆에 표시
  const counter = document.getElementById('cardCounter');
  counter.innerHTML = `${currentCardIndex + 1} / ${todayWords.length}${learned ? ' <span class="learned-badge">✓ 완료</span>' : ''}`;
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('flashcard').classList.toggle('flipped', isFlipped);
  document.getElementById('learnBtns').style.display = isFlipped ? 'flex' : 'none';
}

function prevCard() {
  if (currentCardIndex > 0) { currentCardIndex--; updateFlashcard(); }
}

function nextCard() {
  if (currentCardIndex < todayWords.length - 1) { currentCardIndex++; updateFlashcard(); }
}

function markLearnedAndNext() {
  const w = todayWords[currentCardIndex];
  markLearned(w.id);
  // 진행도 업데이트
  initToday();
  if (currentCardIndex < todayWords.length - 1) { currentCardIndex++; }
  updateFlashcard();
}

function markReviewAndNext() {
  const w = todayWords[currentCardIndex];
  markReview(w.id);
  if (currentCardIndex < todayWords.length - 1) { currentCardIndex++; updateFlashcard(); }
  else updateFlashcard();
}

function initVocab() { filterWords(); }

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterWords();
}

function filterWords() {
  const q = (document.getElementById('wordSearch').value || '').toLowerCase();
  const progress = getProgress();

  let filtered = WORDS.filter(w => {
    if (currentFilter === 'unlearned') return !isLearned(w.id);
    const matchFilter = currentFilter === 'all' || w.level === currentFilter || w.tag === currentFilter;
    const plain = stripHtml(w.jp).toLowerCase();
    const matchQ = !q || plain.includes(q) || (w.kana||'').includes(q) || (w.ko||w.kr||'').includes(q);
    return matchFilter && matchQ;
  });

  const container = document.getElementById('wordListContainer');
  if (!filtered.length) {
    container.innerHTML = '<div class="card"><div class="empty-state">검색 결과가 없습니다.</div></div>';
    return;
  }

  // 레벨별 그룹
  const groups = {};
  filtered.forEach(w => {
    const g = w.level;
    if (!groups[g]) groups[g] = [];
    groups[g].push(w);
  });

  let html = '';
  Object.entries(groups).forEach(([g, ws]) => {
    const items = ws.map(w => {
      const learned = isLearned(w.id);
      return `
        <li class="word-item">
          <div class="word-check ${learned ? 'done' : ''}" onclick="toggleWordLearned('${w.id}', this)">${learned ? '✓' : ''}</div>
          <div>
            <div class="word-jp">${w.jp}</div>
          </div>
          <div class="word-kr">${w.ko || w.kr}</div>
          <span class="word-tag">${w.tag}</span>
        </li>
      `;
    }).join('');
    html += `
      <div class="card" style="padding-bottom:4px">
        <h2><span class="badge">${g}</span> ${ws.length}개</h2>
        <ul class="word-list">${items}</ul>
      </div>
    `;
  });
  container.innerHTML = html;
}

function toggleWordLearned(id, el) {
  if (isLearned(id)) {
    markReview(id);
    el.classList.remove('done');
    el.textContent = '';
  } else {
    markLearned(id);
    el.classList.add('done');
    el.textContent = '✓';
  }
  // 진행도 업데이트
  document.getElementById('progressSection') && initTodayProgress();
}

function initDramaReview() {

  if (!DRAMA_REVIEW || !DRAMA_REVIEW.length) return;

  let html = '<div class="review-section"><div class="review-section-title">📖 최근 복습</div>';

  DRAMA_REVIEW.forEach(rev => {
    const drama = DRAMA.find(d => d.id === rev.dramaId);
    if (!drama) return;
    const uid = `rev-${rev.id}`;

    const linesHtml = (drama.lines || []).map(l => `
      <div class="drama-line">
        <div class="drama-speaker">${l.speaker}</div>
        <div class="drama-jp">${l.jp}</div>
        <div class="drama-kr">${l.ko || l.kr}</div>
      </div>`).join('');

    const wordsHtml = (drama.words || []).map(w => `
      <div style="display:flex;gap:8px;font-size:0.85rem;margin-bottom:3px">
        <span style="color:var(--secondary);font-weight:700;min-width:120px">${w.jp}</span>
        <span>${w.ko || w.kr}</span>
      </div>`).join('');

    const grammarHtml = (rev.grammar || []).map((g, gi) => {
      const practiceHtml = (g.practice || []).map((p, pi) => {
        const pid = `${uid}-g${gi}-p${pi}`;
        return `
          <div class="fill-item">
            <div class="fill-ko">${pi + 1}. ${p.ko}</div>
            <span class="fill-answer-btn" onclick="revealFill('${pid}')">답 보기</span>
            <div class="fill-jp" id="${pid}">${p.jp}</div>
          </div>`;
      }).join('');
      return `
      <div class="grammar-review-item">
        <div class="grammar-review-pattern">${g.pattern}</div>
        <div class="grammar-review-meaning">${g.meaning}</div>
        ${g.note ? `<div class="grammar-review-note">※ ${g.note}</div>` : ''}
        ${(g.examples || []).map(ex => `
          <div class="grammar-ex-item">
            <div class="grammar-ex-jp">${ex.jp}</div>
            <div class="grammar-ex-ko">${ex.ko}</div>
          </div>`).join('')}
        ${practiceHtml ? `<div style="margin-top:8px;font-size:0.78rem;font-weight:700;color:var(--primary);margin-bottom:4px">✏️ 연습</div>${practiceHtml}` : ''}
      </div>`;
    }).join('');

    const fillHtml = (rev.fill || []).map((f, i) => `
      <div class="fill-item">
        <div class="fill-ko">${i + 1}. ${f.ko}</div>
        <span class="fill-answer-btn" onclick="revealFill('${uid}-f${i}')">답 보기</span>
        <div class="fill-jp" id="${uid}-f${i}">${f.jp}</div>
      </div>`).join('');

    html += `
      <div class="review-card">
        <div class="review-card-header" onclick="toggleReview('${uid}')">
          <span>📝 ${rev.title}</span>
          <span class="chevron" id="rchev-${uid}">▼</span>
        </div>
        <div class="review-card-body" id="${uid}">
          <div class="review-sub-title">🎬 대사</div>
          ${linesHtml}
          ${wordsHtml ? `<div class="review-sub-title">📌 단어</div><div class="word-point">${wordsHtml}</div>` : ''}
          ${grammarHtml ? `<div class="review-sub-title">📐 문형</div>${grammarHtml}` : ''}
          ${fillHtml ? `<div class="review-sub-title">✏️ 빈칸 채우기</div>${fillHtml}` : ''}
        </div>
      </div>`;
  });

  html += '</div>';
  container.innerHTML = html;
}

function toggleReview(uid) {
  document.getElementById(uid).classList.toggle('open');
  document.getElementById(`rchev-${uid}`).classList.toggle('open');

function revealFill(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.toggle('show');
  const btn = el.previousElementSibling;
  if (btn) btn.textContent = el.classList.contains('show') ? '답 숨기기' : '답 보기';

  {k:'ソ',r:'so', tip:'씨앗(seed) 뿌리는 동작. 위에 점, 아래로 흐름'},
  {k:'タ',r:'ta', tip:'タ는 た의 윗부분. 타(打) 모양'},
  {k:'チ',r:'chi', tip:'치어리더 모양. 위에 가로획, 아래 곡선'},
  {k:'ツ',r:'tsu', tip:'점 2개가 위에 가로로, 획이 오른쪽 아래로 → シ와 방향이 반대!'},
  {k:'テ',r:'te', tip:'테레비(TV) 안테나 모양. 十자에 위 가로획'},
  {k:'ト',r:'to', tip:'도끼(to-kin/토끼). 세로획에 짧은 가로획'},
  {k:'ナ',r:'na', tip:'나이프(knife). 十자 모양'},
  {k:'ニ',r:'ni', tip:'二(に). 가로 두 획, 숫자 2처럼'},
  {k:'ヌ',r:'nu', tip:'누들(noodle). X자 교차에 마지막 고리'},
  {k:'ネ',r:'ne', tip:'네코(고양이, neko). 고양이 얼굴처럼 생긴 形'},
  {k:'ノ',r:'no', tip:'노(NO)를 사선으로. 단순한 한 획'},
  {k:'ハ',r:'ha', tip:'하하(ha-ha). 두 사람이 웃는 모양'},
  {k:'ヒ',r:'hi', tip:'히(heel, 발뒤꿈치). ㄴ자에 위 가로획'},
  {k:'フ',r:'fu', tip:'후지산(富士山). 위에서 꺾이는 산 모양'},
  {k:'ヘ',r:'he', tip:'へ와 똑같이 생겼어요! 가장 쉬운 카타카나'},
  {k:'ホ',r:'ho', tip:'호(ho-ho). 十자에 양쪽으로 획이 나옴'},
  {k:'マ',r:'ma', tip:'마마(mama). 낚싯바늘 모양'},
  {k:'ミ',r:'mi', tip:'ミ=三(み). 가로 세 획, 미(3)'},
  {k:'ム',r:'mu', tip:'무(cow, MOO). 소가 입을 벌린 모양'},
  {k:'メ',r:'me', tip:'메(me=나). X자 교차'},
  {k:'モ',r:'mo', tip:'모어(more). 가로 세 획 + 곡선'},
  {k:'ヤ',r:'ya', tip:'야(야호). や의 윗부분, 오른쪽 방향'},
  {k:'ユ',r:'yu', tip:'유(U자). 아래가 U자로 열림'},
  {k:'ヨ',r:'yo', tip:'요(요요). ヨ=三개의 가로획, 오른쪽 막힘'},
  {k:'ラ',r:'ra', tip:'라멘(ramen) 그릇. 가로획 + 아래로 꺾임'},
  {k:'リ',r:'ri', tip:'리(ri=두 기둥). 두 세로획이 나란히'},
  {k:'ル',r:'ru', tip:'루트(route). 꺾임이 있는 경로 모양'},
  {k:'レ',r:'re', tip:'레이(ray). 한 획이 아래로 뻗음 (ノ보다 꺾임)'},
  {k:'ロ',r:'ro', tip:'로봇(robot). 완전히 닫힌 사각형'},
  {k:'ワ',r:'wa', tip:'와인잔(wine glass). 위가 열리고 아래로 모임'},
  {k:'ヲ',r:'wo', tip:'조사 を의 카타카나. 거의 외래어 표기에 안 씀'},
  {k:'ン',r:'n', tip:'ン vs ソ 주의! ン은 영어 n처럼 위로 올라감'},
];

const confusedSet = new Set(['シ','ツ','ソ','ン','ア','マ','ウ','ワ','ク','ケ','ヌ','メ','フ','ラ','コ','ロ']);

let quizList = [], quizIdx = 0, quizCorrect = 0, quizAnswered = false;

function initKatakana() {
  renderKtChart();
  renderKtTips();
}

function showKtTab(name, btn) {
  ['chart','tips','quiz'].forEach(n => {
    document.getElementById('kt-' + n).style.display = n === name ? '' : 'none';
  });
  document.querySelectorAll('.kt-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (name === 'quiz' && quizList.length === 0) startQuiz();
}

function renderKtChart() {
  const grid = document.createElement('div');
  grid.className = 'kt-chart-grid';
  KATAKANA.forEach(item => {
    const cell = document.createElement('div');
    if (!item.r) {
      cell.style.visibility = 'hidden';
      cell.className = 'kt-cell';
    } else {
      cell.className = 'kt-cell' + (confusedSet.has(item.k) ? ' confused' : '');
      cell.innerHTML = `<span class="kt-char">${item.k}</span><span class="kt-roma">${item.r}</span>`;
      cell.onclick = () => showKtPopup(item);
    }
    grid.appendChild(cell);
  });
  document.getElementById('ktChartGrid').replaceChildren(grid);

  const confList = document.getElementById('ktConfusedList');
  confList.innerHTML = CONFUSED_PAIRS.map(p => `
    <div class="confused-pair">
      <div class="pair-chars">${p.chars}</div>
      <div>
        <div style="font-weight:700;font-size:0.82rem;margin-bottom:4px">${p.r}</div>
        <div class="pair-desc">${p.desc.replace(/\n/g,'<br>')}</div>
      </div>
    </div>
  `).join('');
}

function showKtPopup(item) {
  const tip = KATAKANA_TIPS.find(t => t.k === item.k);
  const overlay = document.createElement('div');
  overlay.className = 'kt-popup';
  overlay.innerHTML = `
    <div class="kt-popup-inner">
      <div class="kt-popup-char">${item.k}</div>
      <div class="kt-popup-roma">${item.r}</div>
      <div class="kt-popup-hira">히라가나: ${item.h}</div>
      ${tip ? `<div class="kt-popup-tip">💡 ${tip.tip}</div>` : ''}
      <button onclick="this.closest('.kt-popup').remove()" style="margin-top:16px;background:var(--primary);color:#fff;border:none;border-radius:8px;padding:8px 20px;font-size:0.9rem;cursor:pointer">닫기</button>
    </div>
  `;
  overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };
  document.body.appendChild(overlay);
}

function renderKtTips() {
  document.getElementById('ktTipsList').innerHTML = KATAKANA_TIPS.map(t => `
    <div class="kt-tip-item">
      <div class="kt-tip-char">${t.k}<div class="kt-tip-roma">${t.r}</div></div>
      <div class="kt-tip-text">${t.tip}</div>
    </div>
  `).join('');
}

function startQuiz() {
  const mode = document.getElementById('quizMode') ? document.getElementById('quizMode').value : 'kata2roma';
  const pool = KATAKANA.filter(x => x.r && x.r.trim());
  quizList = [...pool].sort(() => Math.random() - 0.5);
  quizIdx = 0; quizCorrect = 0; quizAnswered = false;
  renderQuiz(mode);
}

function renderQuiz(mode) {
  mode = mode || (document.getElementById('quizMode') ? document.getElementById('quizMode').value : 'kata2roma');
  const pool = KATAKANA.filter(x => x.r && x.r.trim());
  if (quizIdx >= quizList.length) {
    document.getElementById('quizBody').innerHTML = `
      <div style="text-align:center;padding:20px">
        <div style="font-size:2rem;margin-bottom:8px">🎉</div>
        <div style="font-size:1.2rem;font-weight:700;margin-bottom:4px">${quizCorrect} / ${quizList.length} 정답</div>
        <div style="color:var(--text-light);margin-bottom:16px">${Math.round(quizCorrect/quizList.length*100)}% 정확도</div>
        <button onclick="startQuiz()" class="quiz-next">다시 하기</button>
      </div>`;
    document.getElementById('quizScore').textContent = '';
    return;
  }
  const item = quizList[quizIdx];
  const question = mode === 'kata2roma' ? item.k : item.r;
  // 오답 3개 선택
  const wrong = pool.filter(x => x.k !== item.k).sort(() => Math.random() - 0.5).slice(0, 3);
  const choices = [...wrong, item].sort(() => Math.random() - 0.5);
  const choiceHtml = choices.map(c => {
    const label = mode === 'kata2roma' ? c.r : c.k;
    return `<button class="quiz-btn" onclick="checkAnswer(this,'${c.k}','${item.k}','${mode}')">${label}</button>`;
  }).join('');
  document.getElementById('quizScore').textContent = `${quizIdx + 1} / ${quizList.length}  ·  맞힌 수: ${quizCorrect}`;
  document.getElementById('quizBody').innerHTML = `
    <div class="quiz-question">${question}</div>
    <div class="quiz-choices">${choiceHtml}</div>
    <div id="quizResult"></div>
  `;
  quizAnswered = false;
}

function checkAnswer(btn, chosen, correct, mode) {
  if (quizAnswered) return;
  quizAnswered = true;
  const isOk = chosen === correct;
  if (isOk) quizCorrect++;
  document.querySelectorAll('.quiz-btn').forEach(b => {
    const label = b.textContent.trim();
    const target = mode === 'kata2roma' ? KATAKANA.find(x=>x.k===correct)?.r : correct;
    if (label === target || b === btn && isOk) b.classList.add('correct');
    else if (b === btn && !isOk) b.classList.add('wrong');
  });
  const res = document.getElementById('quizResult');
  const tip = KATAKANA_TIPS.find(t=>t.k===correct);
  res.innerHTML = `
    <div class="quiz-result" style="background:${isOk?'#d1fae5':'#fee2e2'}">${isOk?'⭕ 정답!':'❌ 오답 — 정답: '+correct+' ('+KATAKANA.find(x=>x.k===correct)?.r+')'}</div>
    ${tip?`<div style="font-size:0.8rem;color:#555;text-align:center;margin-bottom:8px">💡 ${tip.tip}</div>`:''}
    <button class="quiz-next" onclick="quizIdx++;renderQuiz()">다음 →</button>
  `;
}

// 앱 시작
initToday();

function installTodayTalkStyles() {
  if (document.getElementById('todayTalkStyles')) return;
  const style = document.createElement('style');
  style.id = 'todayTalkStyles';
  style.textContent = `
    .talk-topic { font-weight: 700; margin-bottom: 14px; color: #374151; }
    .talk-turn { border: 1px solid #e5e7eb; border-radius: 10px; padding: 12px; margin: 10px 0; background: #fff; }
    .talk-speaker { font-weight: 700; color: #111827; margin-bottom: 6px; }
    .talk-jp { font-size: 1.05rem; line-height: 1.8; color: #111827; }
    .talk-ko, .talk-cue, .talk-tip { margin-top: 6px; color: #4b5563; line-height: 1.5; }
    .talk-mine { cursor: pointer; background: #f8fafc; }
    .talk-reveal { max-height: 0; overflow: hidden; opacity: 0; transition: max-height .24s ease, opacity .2s ease; }
    .talk-mine.open .talk-reveal { max-height: 240px; opacity: 1; }
  `;
  document.head.appendChild(style);
}

function renderTodayTalk() {
  const card = document.getElementById('todayTalkCard');
  if (!card) return;
  if (!TODAY_TALK) {
    card.style.display = 'none';
    return;
  }
  installTodayTalkStyles();
  const topic = document.getElementById('talkTopic');
  const body = document.getElementById('talkBody');
  if (!topic || !body) return;
  topic.innerHTML = `${TODAY_TALK.topic_ko || ''} (${TODAY_TALK.topic || ''}) · ${TODAY_TALK.level || ''}`;
  body.innerHTML = '';
  (TODAY_TALK.turns || []).forEach((turn) => {
    const item = document.createElement('div');
    item.className = `talk-turn${turn.mine ? ' talk-mine' : ''}`;
    if (turn.mine) {
      const speaker = document.createElement('div');
      speaker.className = 'talk-speaker';
      speaker.textContent = '🙋 내 차례';
      const cue = document.createElement('div');
      cue.className = 'talk-cue';
      cue.textContent = turn.cue_ko || '';
      const reveal = document.createElement('div');
      reveal.className = 'talk-reveal';
      const jp = document.createElement('div');
      jp.className = 'talk-jp';
      jp.innerHTML = turn.jp || '';
      const ko = document.createElement('div');
      ko.className = 'talk-ko';
      ko.textContent = turn.ko || '';
      reveal.appendChild(jp);
      reveal.appendChild(ko);
      if (turn.tip) {
        const tip = document.createElement('div');
        tip.className = 'talk-tip';
        tip.textContent = turn.tip;
        reveal.appendChild(tip);
      }
      item.appendChild(speaker);
      item.appendChild(cue);
      item.appendChild(reveal);
      item.addEventListener('click', () => item.classList.toggle('open'));
    } else {
      const speaker = document.createElement('div');
      speaker.className = 'talk-speaker';
      speaker.textContent = turn.who || '';
      const jp = document.createElement('div');
      jp.className = 'talk-jp';
      jp.innerHTML = turn.jp || '';
      const ko = document.createElement('div');
      ko.className = 'talk-ko';
      ko.textContent = turn.ko || '';
      item.appendChild(speaker);
      item.appendChild(jp);
      item.appendChild(ko);
    }
    body.appendChild(item);
  });
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', renderTodayTalk);
} else {
  renderTodayTalk();
}
</script>
</body>
</html>
