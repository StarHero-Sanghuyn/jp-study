  rt { font-size: 0.62em; font-weight: 600; letter-spacing: 0; opacity: 0.95; }
  body {
    font-family: 'Hiragino Sans', 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, var(--primary) 0%, #c1121f 100%);
    color: #fff;
    padding: 18px 20px 14px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(230,57,70,0.3);
    position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.5px; }
  header p { font-size: 0.8rem; opacity: 0.85; margin-top: 2px; }

  .tab-bar {
    display: flex;
    background: #fff;
    border-bottom: 2px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
    position: sticky; top: 64px; z-index: 99;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex: 1;
    min-width: 80px;
    padding: 12px 8px;
    border: none;
    background: none;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text-light);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    border-bottom: 3px solid transparent;
  }
  .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); background: #fff5f5; }
  .tab-btn:hover { background: #f8f8f8; }

  .tab-content { display: none; padding: 16px; max-width: 860px; margin: 0 auto; }
  .tab-content.active { display: block; }

  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 18px;
    margin-bottom: 14px;
  }
  .card h2 {
    font-size: 1rem;
    color: var(--primary);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .badge {
    display: inline-block;
    background: var(--primary);
    color: #fff;
    font-size: 0.68rem;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 600;
  }
  .badge.blue { background: var(--secondary); }
  .badge.green { background: var(--success); }
  .badge.orange { background: var(--accent); color: #333; }

  /* 후리가나(루비) */
  ruby rt {
    font-size: 0.55em;
    color: var(--text-light);
  }

  /* 오늘의 학습 헤더 */
  .today-header {
    background: linear-gradient(135deg, var(--primary), #457b9d);
    color: #fff;
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 14px;
    text-align: center;
  }
  .today-header .date-label { font-size: 0.8rem; opacity: 0.85; }
  .today-header .lesson-title { font-size: 1.4rem; font-weight: 700; margin: 6px 0 4px; }
  .today-header .lesson-sub { font-size: 0.85rem; opacity: 0.9; }

  /* 스트릭 바 */
  .streak-bar { display: flex; justify-content: center; gap: 6px; margin-top: 14px; }
  .streak-day {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; font-weight: 700;
  }
  .streak-day.today { background: rgba(255,255,255,0.3); border: 2px solid #fff; color: #fff; }
  .streak-day.done { background: rgba(255,255,255,0.5); }

  /* 플래시카드 */
  .flashcard-wrap {
    perspective: 1000px;
    height: 180px;
    cursor: pointer;
    margin-bottom: 14px;
  }
  .flashcard {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s;
    border-radius: var(--radius);
  }
  .flashcard.flipped { transform: rotateY(180deg); }
  .flashcard-front, .flashcard-back {
    position: absolute; width: 100%; height: 100%;
    backface-visibility: hidden;
    border-radius: var(--radius);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px;
    box-shadow: var(--shadow);
  }
  .flashcard-front { background: linear-gradient(135deg, #fff5f5, #fff); }
  .flashcard-back { background: linear-gradient(135deg, #f0f9f7, #fff); transform: rotateY(180deg); }
  .flashcard-jp { font-size: 2rem; font-weight: 700; color: var(--primary); text-align: center; line-height: 1.4; }
  .flashcard-reading { font-size: 0.9rem; color: var(--text-light); margin-top: 6px; }
  .flashcard-hint { font-size: 0.75rem; color: var(--text-light); margin-top: 8px; }
  .flashcard-kr { font-size: 1.6rem; font-weight: 700; color: var(--success); text-align: center; }
  .flashcard-example { font-size: 0.95rem; color: var(--text-light); margin-top: 8px; text-align: center; line-height: 1.4; }

  /* 플래시카드 네비 */
  .flashcard-nav {
    display: flex; align-items: center; justify-content: center; gap: 16px;
    margin-bottom: 10px;
  }
  .nav-btn {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 20px; padding: 6px 16px;
    font-size: 0.82rem; font-weight: 600; cursor: pointer;
  }
  .nav-btn:disabled { opacity: 0.4; cursor: default; }
  .card-counter { font-size: 0.82rem; color: var(--text-light); min-width: 50px; text-align: center; }

  /* 학습 버튼 */
  .learn-btns {
    display: flex; gap: 10px; justify-content: center;
    margin-top: 4px;
  }
  .btn-learned {
    background: var(--success); color: #fff;
    border: none; border-radius: 20px; padding: 8px 22px;
    font-size: 0.85rem; cursor: pointer; font-weight: 700;
    transition: opacity 0.2s;
  }
  .btn-learned:hover { opacity: 0.85; }
  .btn-review {
    background: #f0f4f8; color: var(--text);
    border: 1px solid var(--border); border-radius: 20px; padding: 8px 22px;
    font-size: 0.85rem; cursor: pointer; font-weight: 600;
  }
  .progress-bar { background: var(--bg); border-radius: 10px; height: 8px; overflow: hidden; margin-top: 4px; }
  .progress-fill { height: 100%; border-radius: 10px; background: linear-gradient(90deg, var(--primary), var(--accent)); transition: width 0.6s; }
  .progress-text { font-size: 0.75rem; color: var(--text-light); margin-top: 4px; text-align: right; }

  /* 검색 & 필터 */
  .search-box {
    width: 100%; padding: 10px 14px; border: 1px solid var(--border);
    border-radius: 20px; font-size: 0.88rem; outline: none; margin-bottom: 10px;
  }
  .search-box:focus { border-color: var(--primary); }
  .filter-btns { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
  .filter-btn {
    padding: 4px 12px; border: 1px solid var(--border); border-radius: 20px;
    font-size: 0.75rem; background: none; cursor: pointer; font-weight: 600; color: var(--text-light);
  }
  .filter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

  /* 단어 목록 */
  .word-list { list-style: none; }
  .word-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .word-item:last-child { border-bottom: none; }
  .word-jp { font-size: 1.05rem; font-weight: 700; color: var(--primary); line-height: 1.5; }
  .word-reading { font-size: 0.78rem; color: var(--text-light); }
  .word-kr { flex: 1; font-size: 0.88rem; }
  .word-tag { background: #f0f4f8; color: var(--secondary); font-size: 0.68rem; padding: 2px 8px; border-radius: 10px; font-weight: 600; white-space: nowrap; }
  .word-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 0.7rem; cursor: pointer; }
  .word-check.done { background: var(--success); border-color: var(--success); color: #fff; font-weight: 700; }

  /* 문법 */
  .grammar-item { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  .grammar-item:last-child { border-bottom: none; margin-bottom: 0; }
  .grammar-title { font-weight: 700; font-size: 1rem; margin-bottom: 4px; }
  .grammar-desc { font-size: 0.82rem; color: var(--text-light); margin-bottom: 8px; }
  .conj-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; margin-bottom: 8px; }
  .conj-table th, .conj-table td { border: 1px solid var(--border); padding: 4px 6px; text-align: left; }
  .conj-table th { background: var(--surface); font-weight: 600; }
  /* 카타카나 탭 */
  .kt-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .kt-tab { flex: 1; padding: 10px 0; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); font-size: 0.88rem; cursor: pointer; }
  .kt-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); font-weight: 700; }
  .kt-chart-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 20px; }
  .kt-cell { text-align: center; padding: 10px 4px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: background .15s; position: relative; }
  .kt-cell:active { background: var(--primary-light); }
  .kt-cell .kt-char { font-size: 1.5rem; font-weight: 700; display: block; }
  .kt-cell .kt-roma { font-size: 0.7rem; color: var(--text-light); display: block; margin-top: 2px; }
  .kt-cell.confused { border-color: #f59e0b; background: #fffbeb; }
  .kt-popup { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: flex; align-items: center; justify-content: center; z-index: 999; }
  .kt-popup-inner { background: #fff; border-radius: 16px; padding: 28px 32px; text-align: center; min-width: 220px; }
  .kt-popup-char { font-size: 4rem; font-weight: 900; }
  .kt-popup-roma { font-size: 1.4rem; color: var(--primary); font-weight: 700; margin: 4px 0; }
  .kt-popup-hira { font-size: 1.1rem; color: var(--text-light); }
  .kt-popup-tip { font-size: 0.85rem; color: #555; margin-top: 10px; padding: 8px; background: #f8f8f8; border-radius: 8px; }
  .kt-confused { margin-top: 20px; }
  .kt-confused h3 { font-size: 0.95rem; margin-bottom: 10px; }
  .confused-pair { display: flex; align-items: center; gap: 12px; padding: 10px; background: #fffbeb; border: 1px solid #f59e0b; border-radius: 10px; margin-bottom: 8px; }
  .confused-pair .pair-chars { font-size: 1.6rem; font-weight: 900; letter-spacing: 8px; min-width: 80px; }
  .confused-pair .pair-desc { font-size: 0.8rem; color: #555; line-height: 1.5; }
  .kt-tip-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; }
  .kt-tip-char { font-size: 2.2rem; font-weight: 900; min-width: 48px; text-align: center; }
  .kt-tip-roma { font-size: 0.75rem; color: var(--primary); font-weight: 700; }
  .kt-tip-text { font-size: 0.83rem; color: #444; line-height: 1.6; }
  .quiz-question { font-size: 3.5rem; font-weight: 900; text-align: center; margin: 16px 0 24px; }
  .quiz-choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .quiz-btn { padding: 14px; border: 2px solid var(--border); border-radius: 12px; font-size: 1.1rem; background: #fff; cursor: pointer; transition: all .15s; }
  .quiz-btn.correct { background: #d1fae5; border-color: #10b981; }
  .quiz-btn.wrong { background: #fee2e2; border-color: #ef4444; }
  .quiz-result { text-align: center; font-size: 1rem; font-weight: 700; padding: 10px; border-radius: 10px; margin-bottom: 10px; }
  .quiz-next { display: block; width: 100%; padding: 14px; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 8px; }
  .grammar-ex { background: var(--bg); border-radius: 8px; padding: 8px 12px; margin-bottom: 6px; }
  .grammar-ex .jp { font-size: 0.9rem; line-height: 1.6; }
  .grammar-ex .kr { font-size: 0.82rem; color: var(--text-light); margin-top: 2px; }
  .section-title { font-weight: 700; font-size: 0.9rem; color: var(--secondary); padding: 10px 0 6px; }

  /* 여행회화 & 드라마 아코디언 */
  .situation-card, .drama-card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 10px; overflow: hidden; }
  .situation-header, .drama-header {
    padding: 14px 16px; display: flex; justify-content: space-between; align-items: center;
    cursor: pointer; font-weight: 700; font-size: 0.95rem;
  }
  .situation-header:hover, .drama-header:hover { background: #f8f8f8; }
  .situation-body, .drama-body { display: none; padding: 0 16px 14px; }
  .situation-body.open, .drama-body.open { display: block; }
  .chevron { transition: transform 0.3s; font-size: 0.8rem; color: var(--text-light); }
  .chevron.open { transform: rotate(180deg); }

  .dialogue { padding: 8px 0; border-bottom: 1px solid var(--bg); }
  .dialogue:last-child { border-bottom: none; }
  .dialogue-role { font-size: 0.72rem; font-weight: 700; color: var(--secondary); margin-bottom: 2px; }
  .dialogue-jp { font-size: 0.9rem; line-height: 1.6; }
  .dialogue-kr { font-size: 0.8rem; color: var(--text-light); margin-top: 2px; }

  .drama-line { padding: 8px 0; border-bottom: 1px solid var(--bg); }
  .drama-line:last-child { border-bottom: none; }
  .drama-speaker { font-size: 0.72rem; font-weight: 700; color: var(--secondary); margin-bottom: 2px; }
  .drama-jp { font-size: 0.9rem; line-height: 1.6; }
  .drama-kr { font-size: 0.8rem; color: var(--text-light); margin-top: 2px; }
  .word-point { background: var(--bg); border-radius: 8px; padding: 10px 12px; margin-top: 10px; }
  .word-point-title { font-size: 0.8rem; font-weight: 700; margin-bottom: 6px; color: var(--primary); }

  .drama-stage-1 .drama-header { border-left: 4px solid #2a9d8f; }
  .drama-stage-2 .drama-header { border-left: 4px solid #457b9d; }
  .drama-stage-3 .drama-header { border-left: 4px solid #f4a261; }
  .drama-stage-4 .drama-header { border-left: 4px solid var(--primary); }

  /* 최근 복습 섹션 */
  .review-section { margin-bottom: 20px; }
  .review-section-title { font-weight: 700; font-size: 1rem; color: var(--primary); padding: 6px 0 10px; display: flex; align-items: center; gap: 6px; }
  .review-card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 12px; overflow: hidden; border-left: 4px solid #f4a261; }
  .review-card-header { padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-weight: 700; font-size: 0.95rem; }
  .review-card-header:hover { background: #f8f8f8; }
  .review-card-body { display: none; padding: 0 16px 14px; }
  .review-card-body.open { display: block; }
  .review-sub-title { font-size: 0.82rem; font-weight: 700; color: var(--secondary); margin: 12px 0 6px; padding-top: 8px; border-top: 1px solid var(--bg); }
  .review-sub-title:first-child { border-top: none; padding-top: 4px; }
  .grammar-review-item { background: var(--bg); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
  .grammar-review-pattern { font-weight: 700; font-size: 0.92rem; color: var(--primary); margin-bottom: 2px; }
  .grammar-review-meaning { font-size: 0.8rem; color: var(--text-light); margin-bottom: 6px; }
  .grammar-review-note { font-size: 0.78rem; color: #e76f51; margin-bottom: 6px; }
  .grammar-ex-item { font-size: 0.83rem; padding: 4px 0; border-bottom: 1px solid #eee; }
  .grammar-ex-item:last-child { border-bottom: none; }
  .grammar-ex-jp { line-height: 1.6; }
  .grammar-ex-ko { color: var(--text-light); font-size: 0.78rem; }
  .fill-item { background: var(--card-bg); border: 1px solid #e9ecef; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
  .fill-ko { font-size: 0.88rem; margin-bottom: 6px; color: var(--text); font-weight: 500; }
  .fill-answer-btn { font-size: 0.78rem; color: var(--secondary); cursor: pointer; text-decoration: underline; display: inline-block; }
  .fill-jp { display: none; font-size: 0.9rem; line-height: 1.7; color: var(--primary); margin-top: 6px; background: #f0f7ff; border-radius: 6px; padding: 7px 10px; }
  .fill-jp.show { display: block; }

  .empty-state { text-align: center; color: var(--text-light); padding: 30px; }
  .learned-badge { font-size: 0.65rem; background: #d4edda; color: #155724; padding: 1px 6px; border-radius: 10px; margin-left: 4px; }
</style>
</head>
<body>

<header>
  <h1>🇯🇵 일본어 매일 학습</h1>
  <p id="headerDate"></p>
</header>

<nav class="tab-bar">
  <button class="tab-btn active" onclick="showTab('today')">🏠 오늘의 학습</button>
  <button class="tab-btn" onclick="showTab('vocab')">📖 단어장</button>
  <button class="tab-btn" onclick="showTab('grammar')">📝 문법</button>
  <button class="tab-btn" onclick="showTab('travel')">✈️ 여행회화</button>
  <button class="tab-btn" onclick="showTab('drama')">🎬 드라마</button>
  <button class="tab-btn" onclick="showTab('katakana')">🔤 카타카나</button>
</nav>

<!-- 오늘의 학습 탭 -->
<div id="tab-today" class="tab-content active">
  <div class="today-header" id="todayHeader">
    <div class="date-label" id="todayDate"></div>
    <div class="lesson-title" id="todayTitle"></div>
    <div class="lesson-sub" id="todaySub"></div>
    <div class="streak-bar" id="streakBar"></div>
  </div>

  <div class="card">
    <h2>🃏 오늘의 단어 플래시카드</h2>
    <div class="flashcard-wrap" onclick="flipCard()">
      <div class="flashcard" id="flashcard">
        <div class="flashcard-front">
          <div class="flashcard-jp" id="fc-jp">-</div>
          <div class="flashcard-reading" id="fc-reading">-</div>
          <div class="flashcard-hint">클릭하면 뜻이 나와요 👆</div>
        </div>
        <div class="flashcard-back">
          <div class="flashcard-kr" id="fc-kr">-</div>
          <div class="flashcard-reading" id="fc-reading2">-</div>
          <div class="flashcard-example" id="fc-example"></div>
        </div>
      </div>
    </div>
    <div class="flashcard-nav">
      <button class="nav-btn" id="prevBtn" onclick="event.stopPropagation(); prevCard()">◀ 이전</button>
      <span class="card-counter" id="cardCounter">1 / 1</span>
      <button class="nav-btn" id="nextBtn" onclick="event.stopPropagation(); nextCard()">다음 ▶</button>
    </div>
    <div class="learn-btns" id="learnBtns" style="display:none">
      <button class="btn-learned" onclick="markLearnedAndNext()">✓ 알았어요</button>
      <button class="btn-review" onclick="markReviewAndNext()">🔄 다시 볼게요</button>
    </div>
  </div>

<div class="card" id="todayTalkCard">
  <h2>💬 오늘의 회화</h2>
  <div class="talk-topic" id="talkTopic"></div>
  <div id="talkBody"></div>
</div>


  <div class="card" id="todayGrammarCard">
    <h2>📝 오늘의 문법</h2>
    <div id="todayGrammarBody"></div>
  </div>

  <div class="card">
    <h2>📊 학습 진행도</h2>
    <div id="progressSection"></div>
  </div>
</div>

<!-- 단어장 탭 -->
<div id="tab-vocab" class="tab-content">
  <div class="card" style="padding-bottom:8px">
    <input class="search-box" id="wordSearch" type="text" placeholder="단어 검색 (일본어 또는 한국어)..." oninput="filterWords()">
    <div class="filter-btns" id="filterBtns">
      <button class="filter-btn active" onclick="setFilter('all',this)">전체</button>
      <button class="filter-btn" onclick="setFilter('기초어휘',this)">기초어휘</button>
      <button class="filter-btn" onclick="setFilter('동작·회화',this)">동작·회화</button>
      <button class="filter-btn" onclick="setFilter('의견·표현',this)">의견·표현</button>
      <button class="filter-btn" onclick="setFilter('동사',this)">동사</button>
      <button class="filter-btn" onclick="setFilter('형용사',this)">형용사</button>
      <button class="filter-btn" onclick="setFilter('명사',this)">명사</button>
      <button class="filter-btn" onclick="setFilter('부사·표현',this)">부사·표현</button>
      <button class="filter-btn" onclick="setFilter('여행',this)">여행</button>
      <button class="filter-btn" onclick="setFilter('unlearned',this)">⬜ 미학습</button>
    </div>
  </div>
  <div id="wordListContainer"></div>
</div>

<!-- 문법 탭 -->
<div id="tab-grammar" class="tab-content">
  <div id="grammarContainer"></div>
</div>

<!-- 여행회화 탭 -->
<div id="tab-travel" class="tab-content">
  <div id="travelContainer"></div>
</div>

<!-- 드라마 탭 -->
<div id="tab-drama" class="tab-content">
  <div id="dramaReviewContainer"></div>
  <div id="dramaContainer"></div>
</div>

<div id="tab-katakana" class="tab-content">
  <!-- 서브탭 -->
  <div class="kt-tabs">
    <button class="kt-tab active" onclick="showKtTab('chart',this)">📋 일람표</button>
    <button class="kt-tab" onclick="showKtTab('tips',this)">💡 암기법</button>
    <button class="kt-tab" onclick="showKtTab('quiz',this)">✏️ 퀴즈</button>
  </div>

  <!-- 일람표 -->
  <div id="kt-chart" class="kt-section">
    <div class="card">
      <h2>카타카나 50음도</h2>
      <p style="font-size:0.8rem;color:var(--text-light);margin-bottom:12px">탭하면 읽는 법을 확인할 수 있어요</p>
      <div id="ktChartGrid"></div>
      <div class="kt-confused">
        <h3>⚠️ 자주 헷갈리는 쌍</h3>
        <div id="ktConfusedList"></div>
      </div>
    </div>
  </div>

  <!-- 암기법 -->
  <div id="kt-tips" class="kt-section" style="display:none">
    <div class="card">
      <h2>모양으로 기억하는 카타카나</h2>
      <p style="font-size:0.8rem;color:var(--text-light);margin-bottom:12px">각 글자를 이미지로 연상해 보세요</p>
      <div id="ktTipsList"></div>
    </div>
  </div>

  <!-- 퀴즈 -->
  <div id="kt-quiz" class="kt-section" style="display:none">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h2 style="margin:0">카타카나 퀴즈</h2>
        <div>
          <select id="quizMode" style="font-size:0.85rem;padding:4px 8px;border:1px solid var(--border);border-radius:6px;margin-right:6px">
            <option value="kata2roma">카타카나 → 읽기</option>
            <option value="roma2kata">읽기 → 카타카나</option>
          </select>
          <button onclick="startQuiz()" style="background:var(--primary);color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:0.85rem;cursor:pointer">시작</button>
        </div>
      </div>
      <div id="quizScore" style="font-size:0.85rem;color:var(--text-light);margin-bottom:12px"></div>
      <div id="quizBody"></div>
    </div>
  </div>
</div>

<script>
// ============================================================
// 학습 진행도 (localStorage)
// ============================================================
const PROGRESS_KEY = 'jp_study_progress';

function getProgress() {
  return JSON.parse(localStorage.getItem(PROGRESS_KEY) || '{}');
}

function markLearned(id) {
  const p = getProgress();
  p[id] = { status: 'learned', date: new Date().toISOString() };
  localStorage.setItem(PROGRESS_KEY, JSON.stringify(p));
}

function markReview(id) {
  const p = getProgress();
  p[id] = { status: 'review' };
  localStorage.setItem(PROGRESS_KEY, JSON.stringify(p));
}

function isLearned(id) {
  return getProgress()[id]?.status === 'learned';
}

function learnedCount() {
  const p = getProgress();
  return Object.values(p).filter(v => v.status === 'learned').length;
}

// ============================================================
// 앱 상태
// ============================================================
let currentFilter = 'all';
let currentCardIndex = 0;
let todayWords = [];
let isFlipped = false;

// ============================================================
// 날짜 유틸
// ============================================================
function getToday() { return new Date(2026, 6, 24); }

function formatDate(d) {
  const days = ['일','월','화','수','목','금','토'];
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
}

function getDayOfYear(d) {
  const start = new Date(d.getFullYear(), 0, 0);
  return Math.floor((d - start) / 86400000);
}

function stripHtml(s) {
  return (s || '').replace(/<[^>]+>/g, '');
}

// ============================================================
// 오늘의 학습
// ============================================================
function initToday() {
  const d = getToday();
  document.getElementById('headerDate').textContent = formatDate(d);
  document.getElementById('todayDate').textContent = formatDate(d);

  const doy = getDayOfYear(d);
  const lessons = [
    '3과 복습','4과 복습','5과 복습','6과 복습','7과 복습',
    '8과 복습','9과 복습','10과 복습','11과 복습','12과 복습',
    '13과 복습','14과 복습','15과 복습','16과 복습','17과 복습',
    '18과 복습','19과 복습','20과 복습','한걸음 복습','총복습',
  ];
  document.getElementById('todayTitle').textContent = `오늘의 레슨: ${lessons[doy % lessons.length]}`;
  document.getElementById('todaySub').textContent = '플래시카드로 오늘의 단어를 익혀보세요!';

  // 스트릭 바
  const streak = document.getElementById('streakBar');
  streak.innerHTML = '';
  const dayNames = ['일','월','화','수','목','금','토'];
  for (let i = -6; i <= 0; i++) {
    const dd = new Date(d); dd.setDate(d.getDate() + i);
    const el = document.createElement('div');
    el.className = 'streak-day ' + (i === 0 ? 'today' : (i < 0 ? 'done' : 'empty'));
    el.textContent = dayNames[dd.getDay()];
    streak.appendChild(el);
  }

  // 오늘의 단어: 미학습 우선, 날짜 기반 10개
  const progress = getProgress();
  const unlearned = WORDS.filter(w => !isLearned(w.id));
  const learned = WORDS.filter(w => isLearned(w.id));
  const pool = [...unlearned, ...learned];
  const start = (doy * 10) % pool.length;
  todayWords = [];
  for (let i = 0; i < 10; i++) todayWords.push(pool[(start + i) % pool.length]);

  currentCardIndex = 0;
  isFlipped = false;
  updateFlashcard();

  // 오늘의 문법
  const gramIdx = doy % GRAMMAR.length;
  const g = GRAMMAR[gramIdx];
  const nextG = GRAMMAR[(gramIdx + 1) % GRAMMAR.length];
  document.getElementById('todayGrammarBody').innerHTML = renderGrammarItem(g, 'home') + renderGrammarItem(nextG, 'home2');

  // 진행도
  const totalWords = WORDS.length;
  const done = learnedCount();
  document.getElementById('progressSection').innerHTML = `
    <div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;font-size:0.82rem;margin-bottom:4px">
        <span>단어 학습 완료</span>
        <span style="color:var(--success);font-weight:700">${done} / ${totalWords}개</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${(done/totalWords*100).toFixed(0)}%"></div></div>
      <div class="progress-text">${(done/totalWords*100).toFixed(0)}% 완료</div>
    </div>
    <div>
      <div style="display:flex;justify-content:space-between;font-size:0.82rem;margin-bottom:4px">
        <span>전체 과정</span>
        <span style="color:var(--secondary);font-weight:700">${lessons[doy % lessons.length]}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${((doy % lessons.length + 1)/lessons.length*100).toFixed(0)}%;background:linear-gradient(90deg,var(--secondary),#6baed6)"></div></div>
    </div>
  `;
}

function renderGrammarItem(g, prefix) {
  prefix = prefix || 'g';
  const conjHtml = (g.conjugation || []).length ? `
    <table class="conj-table">
      <thead><tr><th>형태</th><th>규칙</th><th>예</th></tr></thead>
      <tbody>${(g.conjugation).map(c => `<tr><td>${c.form}</td><td>${c.rule}</td><td>${c.examples}</td></tr>`).join('')}</tbody>
    </table>` : '';
  const exHtml = (g.examples || []).map(e => `
    <div class="grammar-ex">
      <div class="jp">${e.jp}</div>
      <div class="kr">${e.ko || e.kr}</div>
    </div>
  `).join('');
  const practiceHtml = (g.practice || []).map((p, i) => {
    const pid = `${prefix}-${g.id}-p${i}`;
    return `
    <div class="fill-item">
      <div class="fill-ko">${i + 1}. ${p.ko}</div>
      <span class="fill-answer-btn" onclick="revealFill('${pid}')">답 보기</span>
      <div class="fill-jp" id="${pid}">${p.jp}</div>
    </div>`;
  }).join('');
  const practiceBlock = practiceHtml
    ? `<div style="margin-top:10px;font-size:0.78rem;font-weight:700;color:var(--primary);margin-bottom:4px">✏️ 연습</div>${practiceHtml}`
    : '';
  return `
    <div class="grammar-item">
      <div class="grammar-title">${g.title}</div>
      <div class="grammar-desc">${g.desc}</div>
      ${conjHtml}
      ${exHtml}
      ${practiceBlock}
    </div>
  `;
}

function updateFlashcard() {
  if (!todayWords.length) return;
  const w = todayWords[currentCardIndex];
  const learned = isLearned(w.id);

  document.getElementById('fc-jp').innerHTML = w.jp;
  document.getElementById('fc-reading').textContent = w.kana || w.reading || '';
  document.getElementById('fc-kr').textContent = w.ko || w.kr;
  document.getElementById('fc-reading2').textContent = `(${w.kana || w.reading || ''})`;

  const exJp = w.example_jp || '';
  const exKo = w.example_ko || '';
  document.getElementById('fc-example').innerHTML = exJp
    ? `<div>${exJp}</div><div style="color:#aaa">${exKo}</div>`
    : '';

  document.getElementById('cardCounter').textContent = `${currentCardIndex + 1} / ${todayWords.length}`;
  document.getElementById('prevBtn').disabled = currentCardIndex === 0;
  document.getElementById('nextBtn').disabled = currentCardIndex === todayWords.length - 1;

  // 플래시카드 뒤집기 초기화
  if (isFlipped) {
    document.getElementById('flashcard').classList.remove('flipped');
    isFlipped = false;
    document.getElementById('learnBtns').style.display = 'none';
  }

  // 이미 학습한 단어는 카운터 옆에 표시
  const counter = document.getElementById('cardCounter');
  counter.innerHTML = `${currentCardIndex + 1} / ${todayWords.length}${learned ? ' <span class="learned-badge">✓ 완료</span>' : ''}`;
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('flashcard').classList.toggle('flipped', isFlipped);
  document.getElementById('learnBtns').style.display = isFlipped ? 'flex' : 'none';
}

function prevCard() {
  if (currentCardIndex > 0) { currentCardIndex--; updateFlashcard(); }
}

function nextCard() {
  if (currentCardIndex < todayWords.length - 1) { currentCardIndex++; updateFlashcard(); }
}

function markLearnedAndNext() {
  const w = todayWords[currentCardIndex];
  markLearned(w.id);
  // 진행도 업데이트
  initToday();
  if (currentCardIndex < todayWords.length - 1) { currentCardIndex++; }
  updateFlashcard();
}

function markReviewAndNext() {
  const w = todayWords[currentCardIndex];
  markReview(w.id);
  if (currentCardIndex < todayWords.length - 1) { currentCardIndex++; updateFlashcard(); }
  else updateFlashcard();
}

// ============================================================
// 단어장
// ============================================================
function initVocab() { filterWords(); }

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterWords();
}

function filterWords() {
  const q = (document.getElementById('wordSearch').value || '').toLowerCase();
  const progress = getProgress();

  let filtered = WORDS.filter(w => {
    if (currentFilter === 'unlearned') return !isLearned(w.id);
    const matchFilter = currentFilter === 'all' || w.level === currentFilter || w.tag === currentFilter;
    const plain = stripHtml(w.jp).toLowerCase();
    const matchQ = !q || plain.includes(q) || (w.kana||'').includes(q) || (w.ko||w.kr||'').includes(q);
    return matchFilter && matchQ;
  });

  const container = document.getElementById('wordListContainer');
  if (!filtered.length) {
    container.innerHTML = '<div class="card"><div class="empty-state">검색 결과가 없습니다.</div></div>';
    return;
  }

  // 레벨별 그룹
  const groups = {};
  filtered.forEach(w => {
    const g = w.level;
    if (!groups[g]) groups[g] = [];
    groups[g].push(w);
  });

  let html = '';
  Object.entries(groups).forEach(([g, ws]) => {
    const items = ws.map(w => {
      const learned = isLearned(w.id);
      return `
        <li class="word-item">
          <div class="word-check ${learned ? 'done' : ''}" onclick="toggleWordLearned('${w.id}', this)">${learned ? '✓' : ''}</div>
          <div>
            <div class="word-jp">${w.jp}</div>
          </div>
          <div class="word-kr">${w.ko || w.kr}</div>
          <span class="word-tag">${w.tag}</span>
        </li>
      `;
    }).join('');
    html += `
      <div class="card" style="padding-bottom:4px">
        <h2><span class="badge">${g}</span> ${ws.length}개</h2>
        <ul class="word-list">${items}</ul>
      </div>
    `;
  });
  container.innerHTML = html;
}

function toggleWordLearned(id, el) {
  if (isLearned(id)) {
    markReview(id);
    el.classList.remove('done');
    el.textContent = '';
  } else {
    markLearned(id);
    el.classList.add('done');
    el.textContent = '✓';
  }
  // 진행도 업데이트
  document.getElementById('progressSection') && initTodayProgress();
}

function initTodayProgress() {
  const totalWords = WORDS.length;
  const done = learnedCount();
  const el = document.getElementById('progressSection');
  if (!el) return;
  const doy = getDayOfYear(getToday());
  const lessons = ['3과 복습','4과 복습','5과 복습','6과 복습','7과 복습','8과 복습','9과 복습','10과 복습','11과 복습','12과 복습','13과 복습','14과 복습','15과 복습','16과 복습','17과 복습','18과 복습','19과 복습','20과 복습','한걸음 복습','총복습'];
  el.innerHTML = `
    <div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;font-size:0.82rem;margin-bottom:4px">
        <span>단어 학습 완료</span>
        <span style="color:var(--success);font-weight:700">${done} / ${totalWords}개</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${(done/totalWords*100).toFixed(0)}%"></div></div>
      <div class="progress-text">${(done/totalWords*100).toFixed(0)}% 완료</div>
    </div>
  `;
}

// ============================================================
// 문법
// ============================================================
function initGrammar() {
  const container = document.getElementById('grammarContainer');
  const verbTable = `
    <div class="card" style="margin-bottom:14px">
      <h2>🔤 동사 ます형 활용 규칙</h2>
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:0.82rem;margin-top:8px">
          <thead>
            <tr style="background:#f0f4f8">
              <th style="padding:8px;border:1px solid var(--border);text-align:left">그룹</th>
              <th style="padding:8px;border:1px solid var(--border);text-align:left">규칙</th>
              <th style="padding:8px;border:1px solid var(--border);text-align:left">예시</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td style="padding:8px;border:1px solid var(--border);font-weight:700;color:var(--primary)">1그룹<br><small>(う단 동사)</small></td>
              <td style="padding:8px;border:1px solid var(--border)">마지막 う단 → い단 + ます</td>
              <td style="padding:8px;border:1px solid var(--border)">いく→いき<b>ます</b><br>のむ→のみ<b>ます</b><br>はなす→はなし<b>ます</b></td>
            </tr>
            <tr style="background:#fafafa">
              <td style="padding:8px;border:1px solid var(--border);font-weight:700;color:var(--secondary)">2그룹<br><small>(る동사)</small></td>
              <td style="padding:8px;border:1px solid var(--border)">る를 떼고 + ます</td>
              <td style="padding:8px;border:1px solid var(--border)">たべる→たべ<b>ます</b><br>おきる→おき<b>ます</b><br>ねる→ね<b>ます</b></td>
            </tr>
            <tr>
              <td style="padding:8px;border:1px solid var(--border);font-weight:700;color:var(--success)">3그룹<br><small>(불규칙)</small></td>
              <td style="padding:8px;border:1px solid var(--border)">통째로 암기</td>
              <td style="padding:8px;border:1px solid var(--border)">する→し<b>ます</b><br>くる→き<b>ます</b></td>
            </tr>
            <tr style="background:#fff9f0">
              <td style="padding:8px;border:1px solid var(--border);font-weight:700;color:#c77a00">예외 (2→1)</td>
              <td style="padding:8px;border:1px solid var(--border)">る로 끝나지만 1그룹</td>
              <td style="padding:8px;border:1px solid var(--border)">かえる→かえり<b>ます</b><br>はいる→はいり<b>ます</b><br>はしる→はしり<b>ます</b></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  `;

  const grammarHtml = GRAMMAR.map(g => renderGrammarItem(g, 'tab')).join('');
  container.innerHTML = verbTable + `<div class="card"><h2>📝 문법 패턴 (${GRAMMAR.length}개)</h2>${grammarHtml}</div>`;
}

// ============================================================
// 여행회화
// ============================================================
function initTravel() {
  const container = document.getElementById('travelContainer');
  const html = TRAVEL.map((t, i) => {
    const header = t.icon ? `${t.icon} ${t.situation}` : (t.category || t.situation || '');
    const dialogues = (t.dialogues || []).map(d => `
      <div class="dialogue">
        <div class="dialogue-role">${d.speaker || d.role}</div>
        <div class="dialogue-jp">${d.jp}</div>
        <div class="dialogue-kr">${d.ko || d.kr}</div>
      </div>
    `).join('');
    return `
      <div class="situation-card">
        <div class="situation-header" onclick="toggleSituation(${i})">
          <span>${header}</span>
          <span class="chevron" id="chev-${i}">▼</span>
        </div>
        <div class="situation-body" id="sit-${i}">${dialogues}</div>
      </div>
    `;
  }).join('');
  container.innerHTML = html;
}

function toggleSituation(i) {
  document.getElementById(`sit-${i}`).classList.toggle('open');
  document.getElementById(`chev-${i}`).classList.toggle('open');
}

// ============================================================
// 드라마
// ============================================================
function initDrama() {
  const container = document.getElementById('dramaContainer');
  const stages = [1, 2, 3, 4];
  const stageLabels = {1:'1단계 (입문)', 2:'2단계 (초급)', 3:'3단계 (중급)', 4:'4단계 (고급)'};
  let html = '';

  stages.forEach(stage => {
    const items = DRAMA.filter(d => d.stage === stage);
    if (!items.length) return;
    html += `<div class="section-title">${stageLabels[stage]}</div>`;

    items.forEach((d, i) => {
      const uid = `drama-${stage}-${i}`;
      const wordHtml = (d.words || []).map(w => `
        <div style="display:flex;gap:8px;font-size:0.85rem;margin-bottom:3px">
          <span style="color:var(--secondary);font-weight:700;min-width:120px">${w.jp}</span>
          <span>${w.ko || w.kr}</span>
        </div>
      `).join('');

      const linesHtml = (d.lines || []).map(l => `
        <div class="drama-line">
          <div class="drama-speaker">${l.speaker}</div>
          <div class="drama-jp">${l.jp}</div>
          <div class="drama-kr">${l.ko || l.kr}</div>
        </div>
      `).join('');

      html += `
        <div class="drama-card drama-stage-${stage}">
          <div class="drama-header" onclick="toggleDrama('${uid}')">
            <span>🎬 ${d.title}</span>
            <span class="chevron" id="dchev-${uid}">▼</span>
          </div>
          <div class="drama-body" id="${uid}">
            ${linesHtml}
            ${wordHtml ? `<div class="word-point"><div class="word-point-title">📌 단어 포인트</div>${wordHtml}</div>` : ''}
          </div>
        </div>
      `;
    });
  });

  container.innerHTML = html;
}

function toggleDrama(uid) {
  document.getElementById(uid).classList.toggle('open');
  document.getElementById(`dchev-${uid}`).classList.toggle('open');
}

// ============================================================
// 최근 복습
// ============================================================
function initDramaReview() {
  const container = document.getElementById('dramaReviewContainer');
  if (container.dataset.init) return;
  container.dataset.init = '1';

  if (!DRAMA_REVIEW || !DRAMA_REVIEW.length) return;

  let html = '<div class="review-section"><div class="review-section-title">📖 최근 복습</div>';

  DRAMA_REVIEW.forEach(rev => {
    const drama = DRAMA.find(d => d.id === rev.dramaId);
    if (!drama) return;
    const uid = `rev-${rev.id}`;

    const linesHtml = (drama.lines || []).map(l => `
      <div class="drama-line">
        <div class="drama-speaker">${l.speaker}</div>
        <div class="drama-jp">${l.jp}</div>
        <div class="drama-kr">${l.ko || l.kr}</div>
      </div>`).join('');

    const wordsHtml = (drama.words || []).map(w => `
      <div style="display:flex;gap:8px;font-size:0.85rem;margin-bottom:3px">
        <span style="color:var(--secondary);font-weight:700;min-width:120px">${w.jp}</span>
        <span>${w.ko || w.kr}</span>
      </div>`).join('');

    const fillHtml = (rev.fill || []).map((f, i) => `
      <div class="fill-item">
        <div class="fill-ko">${i + 1}. ${f.ko}</div>
        <span class="fill-answer-btn" onclick="revealFill('${uid}-f${i}')">답 보기</span>
        <div class="fill-jp" id="${uid}-f${i}">${f.jp}</div>
      </div>`).join('');

    html += `
      <div class="review-card">
        <div class="review-card-header" onclick="toggleReview('${uid}')">
          <span>📝 ${rev.title}</span>
          <span class="chevron" id="rchev-${uid}">▼</span>
        </div>
        <div class="review-card-body" id="${uid}">
          <div class="review-sub-title">🎬 대사</div>
          ${linesHtml}
          ${wordsHtml ? `<div class="review-sub-title">📌 단어</div><div class="word-point">${wordsHtml}</div>` : ''}
          ${fillHtml ? `<div class="review-sub-title">✏️ 빈칸 채우기</div>${fillHtml}` : ''}
        </div>
      </div>`;
  });

  html += '</div>';
  container.innerHTML = html;
}

function toggleReview(uid) {
  document.getElementById(uid).classList.toggle('open');
  document.getElementById(`rchev-${uid}`).classList.toggle('open');
}

function revealFill(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.toggle('show');
  const btn = el.previousElementSibling;
  if (btn) btn.textContent = el.classList.contains('show') ? '답 숨기기' : '답 보기';
}

const tabIds = ['today', 'vocab', 'grammar', 'travel', 'drama', 'katakana'];

function showTab(tabName) {
  tabIds.forEach(t => {

const confusedSet = new Set(['シ','ツ','ソ','ン','ア','マ','ウ','ワ','ク','ケ','ヌ','メ','フ','ラ','コ','ロ']);

let quizList = [], quizIdx = 0, quizCorrect = 0, quizAnswered = false;

function initKatakana() {
  renderKtChart();
  renderKtTips();
}

function showKtTab(name, btn) {
  ['chart','tips','quiz'].forEach(n => {
    document.getElementById('kt-' + n).style.display = n === name ? '' : 'none';
  });
  document.querySelectorAll('.kt-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (name === 'quiz' && quizList.length === 0) startQuiz();
}

function renderKtChart() {
  const grid = document.createElement('div');
  grid.className = 'kt-chart-grid';
  KATAKANA.forEach(item => {
    const cell = document.createElement('div');
    if (!item.r) {
      cell.style.visibility = 'hidden';
      cell.className = 'kt-cell';
    } else {
      cell.className = 'kt-cell' + (confusedSet.has(item.k) ? ' confused' : '');
      cell.innerHTML = `<span class="kt-char">${item.k}</span><span class="kt-roma">${item.r}</span>`;
      cell.onclick = () => showKtPopup(item);
    }
    grid.appendChild(cell);
  });
  document.getElementById('ktChartGrid').replaceChildren(grid);

  const confList = document.getElementById('ktConfusedList');
  confList.innerHTML = CONFUSED_PAIRS.map(p => `
    <div class="confused-pair">
      <div class="pair-chars">${p.chars}</div>
      <div>
        <div style="font-weight:700;font-size:0.82rem;margin-bottom:4px">${p.r}</div>
        <div class="pair-desc">${p.desc.replace(/\n/g,'<br>')}</div>
      </div>
    </div>
  `).join('');
}

function showKtPopup(item) {
  const tip = KATAKANA_TIPS.find(t => t.k === item.k);
  const overlay = document.createElement('div');
  overlay.className = 'kt-popup';
  overlay.innerHTML = `
    <div class="kt-popup-inner">
      <div class="kt-popup-char">${item.k}</div>
      <div class="kt-popup-roma">${item.r}</div>
      <div class="kt-popup-hira">히라가나: ${item.h}</div>
      ${tip ? `<div class="kt-popup-tip">💡 ${tip.tip}</div>` : ''}
      <button onclick="this.closest('.kt-popup').remove()" style="margin-top:16px;background:var(--primary);color:#fff;border:none;border-radius:8px;padding:8px 20px;font-size:0.9rem;cursor:pointer">닫기</button>
    </div>
  `;
  overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };
  document.body.appendChild(overlay);
}

function renderKtTips() {
  document.getElementById('ktTipsList').innerHTML = KATAKANA_TIPS.map(t => `
    <div class="kt-tip-item">
      <div class="kt-tip-char">${t.k}<div class="kt-tip-roma">${t.r}</div></div>
      <div class="kt-tip-text">${t.tip}</div>
    </div>
  `).join('');
}

function startQuiz() {
  const mode = document.getElementById('quizMode') ? document.getElementById('quizMode').value : 'kata2roma';
  const pool = KATAKANA.filter(x => x.r && x.r.trim());
  quizList = [...pool].sort(() => Math.random() - 0.5);
  quizIdx = 0; quizCorrect = 0; quizAnswered = false;
  renderQuiz(mode);
}

function renderQuiz(mode) {
  mode = mode || (document.getElementById('quizMode') ? document.getElementById('quizMode').value : 'kata2roma');
  const pool = KATAKANA.filter(x => x.r && x.r.trim());
  if (quizIdx >= quizList.length) {
    document.getElementById('quizBody').innerHTML = `
      <div style="text-align:center;padding:20px">
        <div style="font-size:2rem;margin-bottom:8px">🎉</div>
        <div style="font-size:1.2rem;font-weight:700;margin-bottom:4px">${quizCorrect} / ${quizList.length} 정답</div>
        <div style="color:var(--text-light);margin-bottom:16px">${Math.round(quizCorrect/quizList.length*100)}% 정확도</div>
        <button onclick="startQuiz()" class="quiz-next">다시 하기</button>
      </div>`;
    document.getElementById('quizScore').textContent = '';
    return;
  }
  const item = quizList[quizIdx];
  const question = mode === 'kata2roma' ? item.k : item.r;
  // 오답 3개 선택
  const wrong = pool.filter(x => x.k !== item.k).sort(() => Math.random() - 0.5).slice(0, 3);
  const choices = [...wrong, item].sort(() => Math.random() - 0.5);
  const choiceHtml = choices.map(c => {
    const label = mode === 'kata2roma' ? c.r : c.k;
    return `<button class="quiz-btn" onclick="checkAnswer(this,'${c.k}','${item.k}','${mode}')">${label}</button>`;
  }).join('');
  document.getElementById('quizScore').textContent = `${quizIdx + 1} / ${quizList.length}  ·  맞힌 수: ${quizCorrect}`;
  document.getElementById('quizBody').innerHTML = `
    <div class="quiz-question">${question}</div>
    <div class="quiz-choices">${choiceHtml}</div>
    <div id="quizResult"></div>
  `;
  quizAnswered = false;
}

function checkAnswer(btn, chosen, correct, mode) {
  if (quizAnswered) return;
  quizAnswered = true;
  const isOk = chosen === correct;
  if (isOk) quizCorrect++;
  document.querySelectorAll('.quiz-btn').forEach(b => {
    const label = b.textContent.trim();
    const target = mode === 'kata2roma' ? KATAKANA.find(x=>x.k===correct)?.r : correct;
    if (label === target || b === btn && isOk) b.classList.add('correct');
    else if (b === btn && !isOk) b.classList.add('wrong');
  });
  const res = document.getElementById('quizResult');
  const tip = KATAKANA_TIPS.find(t=>t.k===correct);
  res.innerHTML = `
    <div class="quiz-result" style="background:${isOk?'#d1fae5':'#fee2e2'}">${isOk?'⭕ 정답!':'❌ 오답 — 정답: '+correct+' ('+KATAKANA.find(x=>x.k===correct)?.r+')'}</div>
    ${tip?`<div style="font-size:0.8rem;color:#555;text-align:center;margin-bottom:8px">💡 ${tip.tip}</div>`:''}
    <button class="quiz-next" onclick="quizIdx++;renderQuiz()">다음 →</button>
  `;
}

// 앱 시작
initToday();

function installTodayTalkStyles() {
  if (document.getElementById('todayTalkStyles')) return;
  const style = document.createElement('style');
  style.id = 'todayTalkStyles';
  style.textContent = `
    .talk-topic { font-weight: 700; margin-bottom: 14px; color: #374151; }
    .talk-turn { border: 1px solid #e5e7eb; border-radius: 10px; padding: 12px; margin: 10px 0; background: #fff; }
    .talk-speaker { font-weight: 700; color: #111827; margin-bottom: 6px; }
    .talk-jp { font-size: 1.05rem; line-height: 1.8; color: #111827; }
    .talk-ko, .talk-cue, .talk-tip { margin-top: 6px; color: #4b5563; line-height: 1.5; }
    .talk-mine { cursor: pointer; background: #f8fafc; }
    .talk-reveal { max-height: 0; overflow: hidden; opacity: 0; transition: max-height .24s ease, opacity .2s ease; }
    .talk-mine.open .talk-reveal { max-height: 240px; opacity: 1; }
  `;
  document.head.appendChild(style);
}

function renderTodayTalk() {
  const card = document.getElementById('todayTalkCard');
  if (!card) return;
  if (!TODAY_TALK) {
    card.style.display = 'none';
    return;
  }
  installTodayTalkStyles();
  const topic = document.getElementById('talkTopic');
  const body = document.getElementById('talkBody');
  if (!topic || !body) return;
  topic.innerHTML = `${TODAY_TALK.topic_ko || ''} (${TODAY_TALK.topic || ''}) · ${TODAY_TALK.level || ''}`;
  body.innerHTML = '';
  (TODAY_TALK.turns || []).forEach((turn) => {
    const item = document.createElement('div');
    item.className = `talk-turn${turn.mine ? ' talk-mine' : ''}`;
    if (turn.mine) {
      const speaker = document.createElement('div');
      speaker.className = 'talk-speaker';
      speaker.textContent = '🙋 내 차례';
      const cue = document.createElement('div');
      cue.className = 'talk-cue';
      cue.textContent = turn.cue_ko || '';
      const reveal = document.createElement('div');
      reveal.className = 'talk-reveal';
      const jp = document.createElement('div');
      jp.className = 'talk-jp';
      jp.innerHTML = turn.jp || '';
      const ko = document.createElement('div');
      ko.className = 'talk-ko';
      ko.textContent = turn.ko || '';
      reveal.appendChild(jp);
      reveal.appendChild(ko);
      if (turn.tip) {
        const tip = document.createElement('div');
        tip.className = 'talk-tip';
        tip.textContent = turn.tip;
        reveal.appendChild(tip);
      }
      item.appendChild(speaker);
      item.appendChild(cue);
      item.appendChild(reveal);
      item.addEventListener('click', () => item.classList.toggle('open'));
    } else {
      const speaker = document.createElement('div');
      speaker.className = 'talk-speaker';
      speaker.textContent = turn.who || '';
      const jp = document.createElement('div');
      jp.className = 'talk-jp';
      jp.innerHTML = turn.jp || '';
      const ko = document.createElement('div');
      ko.className = 'talk-ko';
      ko.textContent = turn.ko || '';
      item.appendChild(speaker);
      item.appendChild(jp);
      item.appendChild(ko);
    }
    body.appendChild(item);
  });
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', renderTodayTalk);
} else {
  renderTodayTalk();
}
</script>
